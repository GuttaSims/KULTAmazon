<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>KULT Vendor System - Register</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form id="registerForm">

<input type="text" id="sl_name" placeholder="Second Life Name" required>

<input type="text" id="uuid" placeholder="Second Life UUID" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<p id="message"></p>

</div>

<script src="script.js"></script>

</body>

</html>
