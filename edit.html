<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Edit Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Edit Product</h2>

<div class="editor">

<input id="name" placeholder="Vendor Display Name">

<input id="price" placeholder="Vendor Price">

<input id="image" placeholder="Product Image URL">

<select id="box">
<option value="small">Small Box</option>
<option value="medium">Medium Box</option>
<option value="large">Large Box</option>
</select>

<select id="vendor"></select>

<button id="saveBtn">Save</button>

</div>

<script src="edit.js"></script>

</body>

</html>
