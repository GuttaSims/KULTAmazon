<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>KULT Vendor Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>KULT Vendor Dashboard</h1>

<button id="logoutBtn" class="logout">Logout</button>

<h2>Your Products</h2>
<div id="products"></div>

<h2>Assign Product To Vendor</h2>

<div class="assignBox">

<select id="productSelect"></select>

<select id="vendorSelect"></select>

<select id="boxType">
<option value="small">Small Box</option>
<option value="medium">Medium Box</option>
<option value="large">Large Box</option>
</select>

<input id="vendorPrice" placeholder="Vendor Price">

<button id="assignBtn">Assign</button>

</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
