<!DOCTYPE html>
<html>
<head>
<title>Vendor Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #333;
}

th{
    background:#222;
}

.online{
    color:#00ff88;
}

.offline{
    color:#ff4444;
}
</style>

</head>
<body>

<h2>My Vendors</h2>

<table id="vendorsTable">

<thead>
<tr>
<th>Vendor UUID</th>
<th>Creator</th>
<th>Status</th>
<th>Last Seen</th>
</tr>
</thead>

<tbody id="vendorsBody"></tbody>

</table>


<script>

async function loadVendors(){

    try{

        const res = await fetch("/api/get-vendors");
        const data = await res.json();

        const vendors = data.vendors || [];

        const table = document.getElementById("vendorsBody");
        table.innerHTML = "";

        vendors.forEach(vendor => {

            const tr = document.createElement("tr");

            const lastSeen = new Date(vendor.last_seen);
            const now = new Date();

            const secondsAgo = (now - lastSeen) / 1000;

            const online = secondsAgo < 90;

            tr.innerHTML = `
                <td>${vendor.vendor_uuid}</td>
                <td>${vendor.creator_uuid}</td>
                <td class="${online ? 'online' : 'offline'}">
                    ${online ? "ONLINE" : "OFFLINE"}
                </td>
                <td>${lastSeen.toLocaleString()}</td>
            `;

            table.appendChild(tr);

        });

    }
    catch(err){

        console.error("Vendor load error:", err);

    }

}

loadVendors();

setInterval(loadVendors, 10000);

</script>

</body>
</html>
