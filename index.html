<!DOCTYPE html>
<html>

<head>

<style>
body{

}

.card{

button{

}

</head>

<body>

<h1>KULT Product Dashboard</h1>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<button onclick="addProduct()">Add Product</button>

<div id="products"></div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://ppfptnbnafnyjvpjlqch.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwZnB0bmJuYWZueWp2cGpscWNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTAyNTAsImV4cCI6MjA4ODMyNjI1MH0.US9eA7wEKFv3U6v4_nhlhl-pr62tKfYctZd46Gj9sIg"
)

async function addProduct(){

let name = document.getElementById("name").value
let price = document.getElementById("price").value

await supabaseClient
.from("products")
.insert([{product_name:name,price:price}])

loadProducts()

}

async function loadProducts(){

let { data } = await supabaseClient
.from("products")
.select("*")

let html=""

data.forEach(p=>{

html+=`
<div class="card">
${p.product_name} - ${p.price}L
</div>
`

})

document.getElementById("products").innerHTML = html

}

loadProducts()

</script>

</body>
